<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → WhatsApp Formatter</title>

<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --primary: #25d366;
  --primary-hover: #128c7e;
  --text: #111b21;
  --subtext: #54656f;
  --border: #d1d7db;
  --output-bg: #e7efe7;
}
body { font-family: sans-serif; background: var(--bg); padding:20px; }
.container { max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px; }
textarea { width:100%;min-height:120px;margin-bottom:10px;padding:10px; }
button { padding:10px; margin-right:5px; cursor:pointer; }
#output { background: var(--output-bg); }
</style>
</head>

<body>
<div class="container">
<h2>📱 Markdown → WhatsApp Formatter</h2>

<textarea id="input" placeholder="Paste Markdown..."></textarea>

<button onclick="convert()">🔄 Convert</button>
<button onclick="clearAll()">🗑️ Clear</button>
<button onclick="copy()">📋 Copy</button>

<textarea id="output" readonly></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');


// ==============================
// TABLE CONVERTER (ROBUST)
// ==============================
function convertTable(md) {
  const tableRegex = /^(\|[^\n]+\|\n)(\|[\s:\-]+\|\n)((?:\|[^\n]+\|\n?)+)/gm;

  return md.replace(tableRegex, (match) => {
    const rows = match.trim().split('\n')
      .filter(r => r.startsWith('|') && r.endsWith('|'))
      .filter(r => !r.match(/^\|[\s:\-\|]+\|$/));

    const data = rows.map(r =>
      r.split('|').slice(1, -1).map(c => c.trim())
    );

    if (data.length < 2) return match;

    // Normalize column count
    const colCount = Math.max(...data.map(r => r.length));
    const normalized = data.map(row => {
      while (row.length < colCount) row.push('');
      return row;
    });

    // Column widths
    const colWidths = [];
    for (let i = 0; i < colCount; i++) {
      colWidths[i] = Math.max(...normalized.map(r => r[i].length), 5);
    }

    let out = '```\n';

    normalized.forEach((row, idx) => {
      const line = row.map((c,i)=>c.padEnd(colWidths[i])).join(' │ ');
      out += line + '\n';

      if (idx === 0) {
        out += colWidths.map(w=>'─'.repeat(w)).join('┼') + '\n';
      }
    });

    out += '```';
    return out;
  });
}


// ==============================
// FALLBACK TABLE
// ==============================
function fallbackTable(text) {
  return text.replace(/^\|(.+)\|\s*$/gm, (m, content) => {
    const cells = content.split('|').map(c => c.trim()).filter(Boolean);
    if (cells.length <= 1) return m;
    return '• ' + cells.join(' → ');
  });
}


// ==============================
// MAIN CONVERTER
// ==============================
function convertToWhatsApp(md) {
  if (!md.trim()) return '';

  let text = md.replace(/\r\n/g, '\n');

  // Safe preprocessing ONLY for table lines
  text = text.replace(/^\|.*\|$/gm, line =>
    line.replace(/\s*\|\s*/g, '|')
  );

  // Convert table first
  text = convertTable(text);

  const lines = text.split('\n');

  const processed = lines.map(line => {

    // Heading hierarchy
    line = line.replace(/^#\s+(.*)/, '*📌 $1*');
    line = line.replace(/^##\s+(.*)/, '*▶ $1*');
    line = line.replace(/^###\s+(.*)/, '*• $1*');

    // Lists
    line = line.replace(/^(\*|-)\s+(.*)/, '• $2');
    line = line.replace(/^(\d+)\.\s+(.*)/, '$1. $2');

    // Quote
    line = line.replace(/^>\s*/, '> ');

    return line;
  }).join('\n');

  let result = processed;

  // ==============================
  // INLINE FORMATTING
  // ==============================

  // Bold
  result = result.replace(/\*\*(.+?)\*\*/g, '*$1*');
  result = result.replace(/__(.+?)__/g, '*$1*');

  // Italic (SAFE)
  result = result.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '_$1_');

  // Strike
  result = result.replace(/~~(.+?)~~/g, '~$1~');

  // Code
  result = result.replace(/```([\s\S]*?)```/g, '```$1```');
  result = result.replace(/`(.+?)`/g, '`$1`');

  // Links
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');

  // Cleanup
  result = result.replace(/\n{3,}/g, '\n\n');

  // Fallback table
  result = fallbackTable(result);

  return result.trim();
}


// ==============================
// UI
// ==============================
function convert() {
  outputEl.value = convertToWhatsApp(inputEl.value);
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
}

async function copy() {
  if (!outputEl.value) return;
  await navigator.clipboard.writeText(outputEl.value);
  alert('Copied!');
}


// Auto convert on paste
inputEl.addEventListener('paste', () => {
  setTimeout(() => {
    outputEl.value = convertToWhatsApp(inputEl.value);
  }, 50);
});
</script>
</body>
</html>
