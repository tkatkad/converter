<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → WhatsApp Formatter PRO</title>

<style>
body { font-family:sans-serif; background:#f0f2f5; padding:20px; }
.container { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
textarea { width:100%; min-height:120px; margin-bottom:10px; padding:10px; }
button { padding:10px; margin-right:5px; cursor:pointer; }
#output { background:#e7efe7; }
</style>
</head>

<body>
<div class="container">
<h2>📱 Markdown → WhatsApp Formatter (PRO)</h2>

<textarea id="input" placeholder="Paste Markdown / hasil AI di sini..."></textarea>

<button onclick="convert()">🔄 Convert</button>
<button onclick="clearAll()">🗑️ Clear</button>
<button onclick="copy()">📋 Copy</button>

<textarea id="output" readonly></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');


// ==============================
// 🔥 TABLE ENGINE (AI-PROOF)
// ==============================
function convertTable(md) {
  const tableRegex = /(\|.*\|\n?)+/g;

  return md.replace(tableRegex, (block) => {

    // STEP 1: Normalisasi
    let raw = block
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/\r/g, '');

    let lines = raw.split('\n').map(l => l.trim()).filter(Boolean);

    // STEP 2: Merge broken rows
    let merged = [];
    let current = '';

    for (let line of lines) {
      if (line.startsWith('|')) {
        if (current) merged.push(current);
        current = line;
      } else {
        current += ' ' + line;
      }
    }
    if (current) merged.push(current);

    // STEP 3: Remove separator
    merged = merged.filter(r => !r.match(/^\|[\s:\-\|]+\|$/));

    // STEP 4: Parse cells
    let data = merged.map(r =>
      r.split('|').slice(1, -1).map(cell =>
        cell
          .replace(/\n/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
      )
    );

    if (data.length < 2) return block;

    // STEP 5: Normalize column count
    const colCount = Math.max(...data.map(r => r.length));
    data.forEach(r => {
      while (r.length < colCount) r.push('');
    });

    // STEP 6: Handle LIST inside cell
    data = data.map(row => row.map(cell => {
      return cell
        .replace(/\d+\.\s*/g, '\n$&')
        .replace(/-\s+/g, '\n• ')
        .replace(/\n{2,}/g, '\n')
        .trim();
    }));

    // STEP 7: Column width
    const colWidths = Array(colCount).fill(0);
    data.forEach(r => {
      r.forEach((c,i)=>{
        const maxLine = Math.max(...c.split('\n').map(x=>x.length));
        colWidths[i] = Math.max(colWidths[i], maxLine, 5);
      });
    });

    // STEP 8: Render table
    let out = '```\n';

    data.forEach((row, idx) => {

      // multi-line cell support
      const splitCells = row.map(c => c.split('\n'));
      const maxLines = Math.max(...splitCells.map(c => c.length));

      for (let i = 0; i < maxLines; i++) {
        const line = splitCells.map((cell, ci) =>
          (cell[i] || '').padEnd(colWidths[ci])
        ).join(' │ ');
        out += line + '\n';
      }

      if (idx === 0) {
        out += colWidths.map(w=>'─'.repeat(w)).join('┼') + '\n';
      }
    });

    out += '```';
    return out;
  });
}


// ==============================
// MAIN CONVERTER
// ==============================
function convertToWhatsApp(md) {
  if (!md.trim()) return '';

  let text = md
    .replace(/\r\n/g, '\n')
    .replace(/<br\s*\/?>/gi, '\n');

  // Table dulu
  text = convertTable(text);

  const lines = text.split('\n');

  const processed = lines.map(line => {

    // Heading
    line = line.replace(/^#\s+(.*)/, '*📌 $1*');
    line = line.replace(/^##\s+(.*)/, '*▶ $1*');
    line = line.replace(/^###\s+(.*)/, '*• $1*');

    // List
    line = line.replace(/^(\*|-)\s+(.*)/, '• $2');
    line = line.replace(/^•\s*•/, '•');
    line = line.replace(/^(\d+)\.\s+(.*)/, '$1. $2');

    // Quote
    line = line.replace(/^>\s*/, '> ');

    return line;
  }).join('\n');

  let result = processed;

  // ==============================
  // INLINE FORMATTING (SAFE)
  // ==============================

  // Code first
  result = result.replace(/```([\s\S]*?)```/g, '```$1```');
  result = result.replace(/`(.+?)`/g, '`$1`');

  // Bold
  result = result.replace(/\*\*(.+?)\*\*/g, '*$1*');
  result = result.replace(/__(.+?)__/g, '*$1*');

  // Italic safe
  result = result.replace(/(?<!\*)\*(?!\*)([^*\n]+?)(?<!\*)\*(?!\*)/g, '_$1_');
  result = result.replace(/_(.+?)_/g, '_$1_');

  // Strike
  result = result.replace(/~~(.+?)~~/g, '~$1~');

  // Links
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');

  // Cleanup kacau
  result = result
    .replace(/_\*\s*/g, '*')
    .replace(/\*\*_+/g, '*')
    .replace(/\n{3,}/g, '\n\n');

  return result.trim();
}


// ==============================
// UI
// ==============================
function convert() {
  outputEl.value = convertToWhatsApp(inputEl.value);
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
}

async function copy() {
  if (!outputEl.value) return;
  await navigator.clipboard.writeText(outputEl.value);
  alert('Copied!');
}

// Auto convert
inputEl.addEventListener('paste', () => {
  setTimeout(() => {
    outputEl.value = convertToWhatsApp(inputEl.value);
  }, 50);
});
</script>
</body>
</html>
