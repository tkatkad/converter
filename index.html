<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → WhatsApp Formatter (Final Fix)</title>

<style>
body { font-family:sans-serif; background:#f0f2f5; padding:20px; }
.container { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
textarea { width:100%; min-height:120px; margin-bottom:10px; padding:10px; }
button { padding:10px; margin-right:5px; cursor:pointer; }
#output { background:#e7efe7; }
</style>
</head>

<body>
<div class="container">
<h2>📱 Markdown → WhatsApp Formatter</h2>

<textarea id="input" placeholder="Paste Markdown di sini..."></textarea>

<button onclick="convert()">🔄 Convert</button>
<button onclick="clearAll()">🗑️ Clear</button>
<button onclick="copy()">📋 Copy</button>

<textarea id="output" readonly></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');


// ==============================
// TABLE PARSER (AMAN)
// ==============================
function convertTableRusak(md) {
  const tableRegex = /(\|.*\|\n)+/g;

  return md.replace(tableRegex, (table) => {

    let rows = table.trim().split('\n');

    rows = rows.filter(r => !r.match(/^\|\s*[:\- ]+\|/));

    let data = rows.map(r =>
      r.split('|').slice(1, -1).map(c =>
        c.replace(/<br\s*\/?>/gi, '\n').trim()
      )
    );

    if (data.length < 2) return table;

    const colCount = Math.max(...data.map(r => r.length));

    data.forEach(r => {
      while (r.length < colCount) r.push('');
    });

    const colWidths = Array(colCount).fill(0);
    data.forEach(row => {
      row.forEach((cell, i) => {
        const maxLine = Math.max(...cell.split('\n').map(x => x.length));
        colWidths[i] = Math.max(colWidths[i], maxLine);
      });
    });

    let out = '```\n';

    data.forEach((row, idx) => {

      const splitCells = row.map(c => c.split('\n'));
      const maxLines = Math.max(...splitCells.map(c => c.length));

      for (let i = 0; i < maxLines; i++) {
        const line = splitCells.map((cell, ci) =>
          (cell[i] || '').padEnd(colWidths[ci])
        ).join(' │ ');
        out += line + '\n';
      }

      if (idx === 0) {
        out += colWidths.map(w => '─'.repeat(w)).join('┼') + '\n';
      }
    });

    out += '```';
    return out;
  });
}


function convertTable(md) {
  const tableRegex = /(\|.*\|\n)+/g;

  return md.replace(tableRegex, (table) => {

    let rows = table.trim().split('\n');

    // hapus separator
    rows = rows.filter(r => !r.match(/^\|\s*[:\- ]+\|/));

    // parse
    let data = rows.map(r =>
      r.split('|').slice(1, -1).map(c =>
        c.replace(/<br\s*\/?>/gi, '\n').trim()
      )
    );

    if (data.length < 2) return table;

    const headers = data[0];
    const body = data.slice(1);

    let out = '';

    body.forEach(row => {

      const title = row[0];
      out += `\n• ${title}\n`;

      for (let i = 1; i < headers.length; i++) {
        const colTitle = headers[i];
        const cell = row[i] || '';

        if (!cell.trim()) continue;

        out += `  - ${colTitle}:\n`;

        const lines = cell.split('\n');

        lines.forEach((line, idx) => {
  let clean = line.replace(/^\d+\.\s*/, '');
  out += `    ${idx + 1}. ${clean}\n`;
});
      }
    });

    return out.trim();
  });
}
  

// ==============================
// PROTECT CODE BLOCK
// ==============================
function protectCodeBlocks(text) {
  const blocks = [];
  text = text.replace(/```[\s\S]*?```/g, match => {
    const id = blocks.length;
    blocks.push(match);
    return `@@CODEBLOCK_${id}@@`; // pakai marker aman (tidak kena regex)
  });
  return { text, blocks };
}

function restoreCodeBlocks(text, blocks) {
  return text.replace(/@@CODEBLOCK_(\d+)@@/g, (_, i) => blocks[i]);
}

// ==============================
// INLINE FORMAT (FIX TOTAL)
// ==============================
function formatInline(text) {

  const { text: safeText, blocks } = protectCodeBlocks(text);

  let result = safeText;

  // BOLD
  result = result.replace(/\*\*(.+?)\*\*/g, '*$1*');
  result = result.replace(/__(.+?)__/g, '*$1*');

  // STRIKE
  result = result.replace(/~~(.+?)~~/g, '~$1~');

  // HAPUS italic markdown (_text_) → biar tidak bocor
  // ❌ JANGAN convert italic otomatis
// biarkan plain text saja
  // OPTIONAL: convert *italic* → _italic_ (lebih WA native)
  result = result.replace(/(^|[^*])\*(?!\*)([^*\n]+?)\*(?!\*)/g, '$1_$2_');

  // FIX bullet / heading glitch
  result = result.replace(/^_?([•▶📌])/gm, '$1');

  // LINK
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');
  // hapus italic markdown sisa
result = result.replace(/(^|[\s])_([^_\n]+?)_(?=[\s.,]|$)/g, '$1$2');

  return restoreCodeBlocks(result, blocks);
}


// ==============================
// MAIN
// ==============================
function convertToWhatsApp(md) {
  if (!md.trim()) return '';

  let text = md.replace(/\r\n/g, '\n');

  // table dulu
  text = convertTable(text);

  const lines = text.split('\n');

  const processed = lines.map(line => {

    line = line.replace(/^###\s+(.*)/, '• $1');
    line = line.replace(/^##\s+(.*)/, '▶ $1');
    line = line.replace(/^#\s+(.*)/, '📌 $1');

    line = line.replace(/^(\*|-)\s+(.*)/, '• $2');
    line = line.replace(/^(\d+)\.\s+(.*)/, '$1. $2');

    line = line.replace(/^>\s*/, '> ');

    return line;
  }).join('\n');

  let result = formatInline(processed);
// ==============================
// FINAL NORMALIZER (WA FORMAT)
// ==============================

// kasus: _teks...*
result = result.replace(/_([^_*][^*]*?)\*/g, '*_$1_*');

// kasus: *teks..._
result = result.replace(/\*([^_*][^_]*?)_/g, '*_$1_*');

// cleanup double wrap (jaga kalau sudah benar)
result = result.replace(/\*__([^_]+?)__\*/g, '*_$1_*');

// rapikan spasi
result = result.replace(/\*_\s+/g, '*_');
result = result.replace(/\s+_\*/g, '_*');
  result = result.replace(/\n{3,}/g, '\n\n');

  

  return result.trim();
}


// ==============================
// UI
// ==============================
function convert() {
  outputEl.value = convertToWhatsApp(inputEl.value);
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
}

async function copy() {
  if (!outputEl.value) return;
  await navigator.clipboard.writeText(outputEl.value);
  alert('Copied!');
}

inputEl.addEventListener('paste', () => {
  setTimeout(() => {
    outputEl.value = convertToWhatsApp(inputEl.value);
  }, 50);
});
</script>
