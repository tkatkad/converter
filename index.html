<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → WhatsApp Formatter</title>

<style>
:root {
  --bg:#f0f2f5; --card:#fff; --primary:#25d366;
}
body { font-family:sans-serif; background:var(--bg); padding:20px; }
.container { max-width:800px; margin:auto; background:var(--card); padding:20px; border-radius:10px; }
textarea { width:100%; min-height:120px; margin-bottom:10px; padding:10px; }
button { padding:10px; margin-right:5px; cursor:pointer; }
#output { background:#e7efe7; }
</style>
</head>

<body>
<div class="container">
<h2>📱 Markdown → WhatsApp Formatter</h2>

<textarea id="input" placeholder="Paste Markdown..."></textarea>

<button onclick="convert()">🔄 Convert</button>
<button onclick="clearAll()">🗑️ Clear</button>
<button onclick="copy()">📋 Copy</button>

<textarea id="output" readonly></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');


// ==============================
// TABLE PARSER (ROBUST)
// ==============================
function convertTable(md) {
  const lines = md.split('\n');
  let result = [];
  let buffer = [];

  function flushTable() {
    if (buffer.length < 2) {
      result.push(...buffer);
      buffer = [];
      return;
    }

    const rows = buffer.map(r =>
      r.split('|').slice(1, -1).map(c => c.trim())
    );

    const colCount = Math.max(...rows.map(r => r.length));

    rows.forEach(r => {
      while (r.length < colCount) r.push('');
    });

    const colWidths = Array(colCount).fill(0);
    rows.forEach(r => {
      r.forEach((c,i)=>{
        colWidths[i] = Math.max(colWidths[i], c.length, 5);
      });
    });

    let out = '```\n';

    rows.forEach((row, idx) => {
      const line = row.map((c,i)=>c.padEnd(colWidths[i])).join(' │ ');
      out += line + '\n';

      if (idx === 0) {
        out += colWidths.map(w=>'─'.repeat(w)).join('┼') + '\n';
      }
    });

    out += '```';
    result.push(out);
    buffer = [];
  }

  for (let line of lines) {
    if (line.includes('|')) {
      buffer.push(line);
    } else {
      flushTable();
      result.push(line);
    }
  }

  flushTable();
  return result.join('\n');
}


// ==============================
// FALLBACK TABLE
// ==============================
function fallbackTable(text) {
  return text.replace(/^\|(.+)\|\s*$/gm, (m, content) => {
    const cells = content.split('|').map(c => c.trim()).filter(Boolean);
    if (cells.length <= 1) return m;
    return '• ' + cells.join(' → ');
  });
}


// ==============================
// MAIN CONVERTER
// ==============================
function convertToWhatsApp(md) {
  if (!md.trim()) return '';

  let text = md.replace(/\r\n/g, '\n');

  // Handle <br>
  text = text.replace(/<br\s*\/?>/gi, '\n');

  // Rapikan pipe hanya untuk baris tabel
  text = text.replace(/^\|.*\|$/gm, line =>
    line.replace(/\s*\|\s*/g, '|')
  );

  // Convert table
  text = convertTable(text);

  const lines = text.split('\n');

  const processed = lines.map(line => {

    // Heading
    line = line.replace(/^#\s+(.*)/, '*📌 $1*');
    line = line.replace(/^##\s+(.*)/, '*▶ $1*');
    line = line.replace(/^###\s+(.*)/, '*• $1*');

    // List
    line = line.replace(/^(\*|-)\s+(.*)/, '• $2');
    line = line.replace(/^•\s*•/, '•');
    line = line.replace(/^(\d+)\.\s+(.*)/, '$1. $2');

    // Quote
    line = line.replace(/^>\s*/, '> ');

    return line;
  }).join('\n');

  let result = processed;

  // ==============================
  // INLINE FORMATTING (SAFE ORDER)
  // ==============================

  // Code first
  result = result.replace(/```([\s\S]*?)```/g, '```$1```');
  result = result.replace(/`(.+?)`/g, '`$1`');

  // Bold
  result = result.replace(/\*\*(.+?)\*\*/g, '*$1*');
  result = result.replace(/__(.+?)__/g, '*$1*');

  // Italic (tidak ganggu bold)
  result = result.replace(/(?<!\*)\*(?!\*)([^*\n]+?)(?<!\*)\*(?!\*)/g, '_$1_');

  // Underscore italic
  result = result.replace(/_(.+?)_/g, '_$1_');

  // Strike
  result = result.replace(/~~(.+?)~~/g, '~$1~');

  // Links
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');

  // Cleanup
  result = result.replace(/\n{3,}/g, '\n\n');

  // Fallback table
  result = fallbackTable(result);

  return result.trim();
}


// ==============================
// UI
// ==============================
function convert() {
  outputEl.value = convertToWhatsApp(inputEl.value);
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
}

async function copy() {
  if (!outputEl.value) return;
  await navigator.clipboard.writeText(outputEl.value);
  alert('Copied!');
}

// Auto convert on paste
inputEl.addEventListener('paste', () => {
  setTimeout(() => {
    outputEl.value = convertToWhatsApp(inputEl.value);
  }, 50);
});
</script>
</body>
</html>
