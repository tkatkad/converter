<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → WhatsApp Formatter 📋</title>
<style>
:root {
  --bg: #f0f2f5; --card: #ffffff; --primary: #25d366;
  --primary-hover: #128c7e; --text: #111b21; --subtext: #54656f;
  --border: #d1d7db; --output-bg: #e7efe7;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
       background: var(--bg); padding: 20px; margin: 0; color: var(--text); }
.container { max-width: 900px; margin: auto; background: var(--card); 
             padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
h2 { margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 8px; }
textarea { width: 100%; min-height: 150px; margin: 12px 0; padding: 12px; 
           border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
           font-family: monospace; resize: vertical; }
textarea:focus { outline: none; border-color: var(--primary); }
#output { background: var(--output-bg); min-height: 200px; white-space: pre-wrap; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
button { padding: 10px 16px; background: var(--primary); color: white; border: none; 
         border-radius: 8px; cursor: pointer; font-weight: 500; transition: background 0.2s;
         display: flex; align-items: center; gap: 6px; }
button:hover { background: var(--primary-hover); }
button.secondary { background: #6c757d; }
button.secondary:hover { background: #5a6268; }
.status { font-size: 13px; color: var(--subtext); margin-top: 8px; min-height: 20px; }
.status.success { color: var(--primary); }
.hint { font-size: 12px; color: var(--subtext); margin: 8px 0; padding: 10px; 
        background: #f8f9fa; border-radius: 6px; }
.hint code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <h2>📱 Markdown → WhatsApp Formatter</h2>
  
  <div class="hint">
    💡 <strong>Fitur baru:</strong> Tabel otomatis diubah jadi bullet list vertikal 
    agar lebih rapi di WhatsApp! 📋
  </div>

  <textarea id="input" placeholder="Paste Markdown di sini..."></textarea>

  <div class="btn-group">
    <button onclick="convert()">🔄 Convert</button>
    <button class="secondary" onclick="clearAll()">🗑️ Clear</button>
    <button class="secondary" onclick="copy()">📋 Copy Result</button>
  </div>
  
  <div class="status" id="status"></div>
  <textarea id="output" readonly placeholder="Hasil konversi akan muncul di sini..."></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');

// ==============================
// MAIN CONVERTER - BULLET LIST MODE
// ==============================
function convertToWhatsApp(md) {
  if (!md?.trim()) return '';
  
  let text = md.replace(/\r\n/g, '\n');
  
  // 1. Handle <br> tags → line break
  text = text.replace(/<br\s*\/?>/gi, '\n');
  
  // 2. Handle HTML entities
  text = text.replace(/&nbsp;/g, ' ')
             .replace(/&amp;/g, '&')
             .replace(/&lt;/g, '<')
             .replace(/&gt;/g, '>');
  
  // 3. Clean stray formatting: "_• _" → "• "
  text = text.replace(/_\s*•\s*_/g, '• ')
             .replace(/^•\s*_+\s*/gm, '• ')
             .replace(/\s*_+\s*(?=\n|$)/gm, '');
  
  // 4. Convert pseudo-table: • A → B → C → bullet list vertikal
  text = convertPseudoTableToBullets(text);
  
  // 5. Convert standard markdown table | A | B | C | → bullet list vertikal
  text = convertStandardTableToBullets(text);
  
  // 6. Process line-by-line: headings, lists, quotes
  const lines = text.split('\n');
  const processed = lines.map(line => {
    let l = line;
    // Headings
    l = l.replace(/^#\s+(.*)/, '*📌 $1*');
    l = l.replace(/^##\s+(.*)/, '*▶ $1*');
    l = l.replace(/^###\s+(.*)/, '*• $1*');
    // Lists
    if (!l.trim().startsWith('```')) {
      l = l.replace(/^(\*|-)\s+/, '• ');
    }
    // Blockquotes
    l = l.replace(/^>\s*/, '▌ ');
    return l;
  }).join('\n');
  
  let result = processed;
  
  // ==============================
  // INLINE FORMATTING
  // ==============================
  // Bold
  result = result.replace(/\*\*([^*\n]+?)\*\*/g, '*$1*');
  result = result.replace(/__([^_\n]+?)__/g, '*$1*');
  // Italic → WhatsApp uses _italic_
  result = result.replace(/(?<!\w|\*)\*([^*\n]+?)\*(?!\w|\*)/g, '_$1_');
  result = result.replace(/(?<!\w|_)_([^_\n]+?)_(?!\w|_)/g, '_$1_');
  result = result.replace(/_{3,}/g, '_');
  // Strikethrough
  result = result.replace(/~~([^~\n]+?)~~/g, '~$1~');
  // Inline code
  result = result.replace(/`([^`\n]+?)`/g, '`$1`');
  // Code blocks
  result = result.replace(/```([\s\S]*?)```/g, (m, code) => '```\n' + code.trim() + '\n```');
  // Links
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');
  
  // Cleanup
  result = result.replace(/\n{4,}/g, '\n\n\n');
  result = result.replace(/^\s+|\s+$/g, '');
  
  return result.trim();
}

// ==============================
// PSEUDO-TABLE → BULLET LIST
// Format: • Kelurahan → Rayon 1 → Rayon 2
// ==============================
function convertPseudoTableToBullets(text) {
  // Match pattern: • Header → Col1 → Col2 → ...
  const pseudoTableRegex = /^•\s*([^→\n]+?)\s*→\s*([^→\n]+?)\s*→\s*(.+?)(?=\n•|\n$|$)/gms;
  
  return text.replace(pseudoTableRegex, (match, header, col1Raw, col2Raw) => {
    const clean = (str) => str.trim()
      .replace(/<[^>]+>/g, '')
      .replace(/\n+/g, ', ')
      .replace(/\s+/g, ' ')
      .replace(/^_+|_+$/g, '')
      .trim();
    
    const h = clean(header);
    const c1 = clean(col1Raw);
    const c2 = clean(col2Raw);
    
    // Format output: row-based bullet with nested lists
    let output = `📍 *${h}*\n`;
    
    // Parse Rayon 1 items (split by number pattern or comma)
    const parseItems = (str) => {
      // If contains numbered items like "1. X 2. Y", split by number
      if (/\d+\.\s/.test(str)) {
        return str.split(/\s*(?=\d+\.)/).filter(s => s.trim());
      }
      // Else split by comma
      return str.split(',').filter(s => s.trim());
    };
    
    const items1 = parseItems(c1);
    const items2 = parseItems(c2);
    
    output += `   ├─ *Rayon 1:*\n`;
    items1.forEach(item => {
      output += `   • ${item.trim()}\n`;
    });
    output += `   └─ *Rayon 2:*\n`;
    items2.forEach(item => {
      output += `   • ${item.trim()}\n`;
    });
    
    return output.trim();
  });
}

// ==============================
// STANDARD TABLE → BULLET LIST (COLUMN-BASED)
// Format: | Header1 | Header2 | → each column as separate list
// ==============================
function convertStandardTableToBullets(md) {
  return md.replace(/^(\|[^\n]+\|\n)(\|[\s:\-|]+\|\n)((?:\|[^\n]+\|\n?)+)/gm, (match) => {
    const rows = match.trim().split('\n')
      .filter(r => r.trim().startsWith('|') && r.trim().endsWith('|'))
      .filter(r => !r.match(/^\|[\s:\-|]+\|$/));
    
    if (rows.length < 1) return match;
    
    // Parse cells
    const data = rows.map(r => 
      r.split('|').slice(1, -1).map(c => c.trim().replace(/<[^>]+>/g, ''))
    );
    
    const colCount = Math.max(...data.map(r => r.length));
    const normalized = data.map(row => {
      const r = [...row];
      while (r.length < colCount) r.push('');
      return r.slice(0, colCount);
    });
    
    // Extract headers (first row)
    const headers = normalized[0].map(h => h || 'Kolom');
    
    // Build output: each column as separate bullet list
    let output = '';
    for (let colIdx = 0; colIdx < colCount; colIdx++) {
      const colHeader = headers[colIdx] || `Kolom ${colIdx + 1}`;
      output += `📋 *${colHeader}*\n`;
      
      // Skip header row for content, start from index 1
      for (let rowIdx = 1; rowIdx < normalized.length; rowIdx++) {
        const cell = normalized[rowIdx][colIdx]?.trim();
        if (cell) {
          // If cell contains multiple items (numbered or comma), expand
          const items = cell.split(/[\n,]/).filter(s => s.trim());
          if (items.length > 1) {
            items.forEach(item => {
              output += `• ${item.trim()}\n`;
            });
          } else {
            output += `• ${cell}\n`;
          }
        }
      }
      output += '\n';
    }
    
    return output.trim();
  });
}

// ==============================
// UI FUNCTIONS
// ==============================
function convert() {
  try {
    const result = convertToWhatsApp(inputEl.value);
    outputEl.value = result;
    showStatus('✅ Konversi berhasil!', 'success');
  } catch (e) {
    showStatus('❌ Error: ' + e.message, 'error');
    console.error(e);
  }
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
  showStatus('');
  inputEl.focus();
}

async function copy() {
  if (!outputEl.value.trim()) {
    showStatus('⚠️ Tidak ada hasil untuk disalin', 'error');
    return;
  }
  try {
    await navigator.clipboard.writeText(outputEl.value);
    showStatus('📋 Hasil disalin ke clipboard!', 'success');
  } catch {
    outputEl.select();
    document.execCommand('copy');
    showStatus('📋 Hasil disalin!', 'success');
  }
}

function showStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
  if (msg) setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ''; }, 3000);
}

// Auto-convert on paste
let pasteTimeout;
inputEl.addEventListener('paste', () => {
  clearTimeout(pasteTimeout);
  pasteTimeout = setTimeout(convert, 100);
});

// Keyboard shortcut: Ctrl+Enter
inputEl.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    convert();
  }
});

showStatus('Siap! Paste Markdown & klik Convert 🚀');
</script>
</body>
</html>
