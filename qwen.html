
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown тЖТ WhatsApp Formatter тЬи Improved</title>
<style>
:root {
  --bg: #f0f2f5; --card: #ffffff; --primary: #25d366;
  --primary-hover: #128c7e; --text: #111b21; --subtext: #54656f;
  --border: #d1d7db; --output-bg: #e7efe7; --error: #ff6b6b;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
       background: var(--bg); padding: 20px; margin: 0; color: var(--text); }
.container { max-width: 900px; margin: auto; background: var(--card); 
             padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
h2 { margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 8px; }
textarea { width: 100%; min-height: 150px; margin: 12px 0; padding: 12px; 
           border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
           font-family: monospace; resize: vertical; transition: border-color 0.2s; }
textarea:focus { outline: none; border-color: var(--primary); }
#output { background: var(--output-bg); min-height: 200px; white-space: pre-wrap; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
button { padding: 10px 16px; background: var(--primary); color: white; border: none; 
         border-radius: 8px; cursor: pointer; font-weight: 500; transition: background 0.2s;
         display: flex; align-items: center; gap: 6px; }
button:hover { background: var(--primary-hover); }
button.secondary { background: #6c757d; }
button.secondary:hover { background: #5a6268; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.status { font-size: 13px; color: var(--subtext); margin-top: 8px; min-height: 20px; }
.status.success { color: var(--primary); }
.status.error { color: var(--error); }
.hint { font-size: 12px; color: var(--subtext); margin: 8px 0; 
        padding: 10px; background: #f8f9fa; border-radius: 6px; }
.hint code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <h2>ЁЯУ▒ Markdown тЖТ WhatsApp Formatter</h2>
  
  <div class="hint">
    ЁЯТб <strong>Tip:</strong> Paste Markdown Anda di bawah. Format yang didukung:
    <code># Heading</code>, <code>**bold**</code>, <code>*italic*</code>, 
    <code>~~strike~~</code>, <code>[link](url)</code>, tabel <code>|</code> atau <code>тАв тЖТ</code>
  </div>

  <textarea id="input" placeholder="Paste Markdown di sini...&#10;&#10;Contoh:&#10;# Judul&#10;тАв Item 1 тЖТ Nilai A тЖТ Nilai B&#10;**Teks tebal** dan _teks miring_"></textarea>

  <div class="btn-group">
    <button onclick="convert()">ЁЯФД Convert</button>
    <button class="secondary" onclick="clearAll()">ЁЯЧСя╕П Clear</button>
    <button class="secondary" onclick="copy()">ЁЯУЛ Copy Result</button>
    <button class="secondary" onclick="copyInput()">ЁЯУД Copy Input</button>
  </div>
  
  <div class="status" id="status"></div>
  
  <textarea id="output" readonly placeholder="Hasil konversi akan muncul di sini..."></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');

// ==============================
// MAIN CONVERTER - IMPROVED v2.0
// ==============================
function convertToWhatsApp(md) {
  if (!md?.trim()) return '';
  
  let text = md.replace(/\r\n/g, '\n');
  
  // 1. Handle <br> tags тЖТ line break untuk WhatsApp
  text = text.replace(/<br\s*\/?>/gi, '\n');
  
  // 2. Handle HTML entities
  text = text.replace(/&nbsp;/g, ' ')
             .replace(/&amp;/g, '&')
             .replace(/&lt;/g, '<')
             .replace(/&gt;/g, '>');
  
  // 3. Pre-process: Clean stray formatting markers like "_тАв _" or "тАв _"
  text = text.replace(/_\s*тАв\s*_/g, 'тАв ');
  text = text.replace(/^тАв\s*_+\s*/gm, 'тАв ');
  text = text.replace(/\s*_+\s*$/gm, '');
  
  // 4. Convert pseudo-table: тАв Kelurahan тЖТ Rayon1 тЖТ Rayon2
  text = text.replace(/^тАв\s*([^тЖТ\n]+?)\s*тЖТ\s*([^тЖТ\n]+?)\s*тЖТ\s*(.+?)(?=\nтАв|\n$|$)/gms, 
    (match, col1, col2, col3) => {
      const c1 = col1.trim().replace(/^_+|_+$/g, '').trim();
      const formatList = (str) => str.trim()
        .replace(/<[^>]+>/g, '')  // Remove HTML tags
        .replace(/\n+/g, ', ')     // Convert newlines to comma
        .replace(/\s+/g, ' ')      // Normalize spaces
        .trim();
      const r1 = formatList(col2);
      const r2 = formatList(col3);
      return `ЁЯУН *${c1}*\n   тФЬтФА Rayon 1: ${r1}\n   тФФтФА Rayon 2: ${r2}`;
    });
  
  // 5. Remove separator lines: тАв :--- тЖТ :--- тЖТ :---
  text = text.replace(/^тАв\s*:?-+\s*тЖТ/gm, '').trim();
  
  // 6. Convert standard markdown tables | col | col |
  text = convertStandardTable(text);
  
  // 7. Process line-by-line for headings, lists, quotes
  const lines = text.split('\n');
  const processed = lines.map(line => {
    let l = line;
    
    // Headings
    l = l.replace(/^#\s+(.*)/, '*ЁЯУМ $1*');
    l = l.replace(/^##\s+(.*)/, '*тЦ╢ $1*');
    l = l.replace(/^###\s+(.*)/, '*тАв $1*');
    l = l.replace(/^####\s+(.*)/, '*  $1*');
    
    // Lists: convert - or * to тАв (but not inside code blocks)
    if (!l.trim().startsWith('```')) {
      l = l.replace(/^(\*|-)\s+/, 'тАв ');
    }
    
    // Blockquotes
    l = l.replace(/^>\s*/, 'тЦМ ');
    
    return l;
  }).join('\n');
  
  let result = processed;
  
  // ==============================
  // INLINE FORMATTING
  // ==============================
  
  // Bold: **text** or __text__ тЖТ *text*
  result = result.replace(/\*\*([^*\n]+?)\*\*/g, '*$1*');
  result = result.replace(/__([^_\n]+?)__/g, '*$1*');
  
  // Italic: Use _text_ for WhatsApp (not *)
  // Match *text* or _text_ but avoid matching inside words or code
  result = result.replace(/(?<!\w|\*)\*([^*\n]+?)\*(?!\w|\*)/g, '_$1_');
  result = result.replace(/(?<!\w|_)_([^_\n]+?)_(?!\w|_)/g, '_$1_');
  
  // Fix double underscores from nested replacements
  result = result.replace(/_{3,}/g, '_');
  
  // Strikethrough: ~~text~~ тЖТ ~text~
  result = result.replace(/~~([^~\n]+?)~~/g, '~$1~');
  
  // Inline code: `text` тЖТ keep (WhatsApp supports monospace)
  result = result.replace(/`([^`\n]+?)`/g, '`$1`');
  
  // Code blocks: preserve as-is
  result = result.replace(/```([\s\S]*?)```/g, (m, code) => {
    return '```\n' + code.trim() + '\n```';
  });
  
  // Links: [text](url) тЖТ text (url)
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');
  
  // Cleanup
  result = result.replace(/\n{4,}/g, '\n\n\n'); // Max 3 newlines
  result = result.replace(/^\s+|\s+$/g, ''); // Trim outer whitespace
  
  // Final fallback: any remaining тАв X тЖТ Y patterns
  result = result.replace(/^тАв\s*([^тЖТ\n]+?)\s*тЖТ\s*(.+)$/gm, 
    (m, a, b) => `тАв ${a.trim()}: ${b.trim()}`);
  
  return result.trim();
}

// ==============================
// STANDARD TABLE CONVERTER
// ==============================
function convertStandardTable(md) {
  return md.replace(/^(\|[^\n]+\|\n)(\|[\s:\-|]+\|\n)((?:\|[^\n]+\|\n?)+)/gm, (match) => {
    const rows = match.trim().split('\n')
      .filter(r => r.trim().startsWith('|') && r.trim().endsWith('|'))
      .filter(r => !r.match(/^\|[\s:\-|]+\|$/));
    
    if (rows.length < 1) return match;
    
    const data = rows.map(r => 
      r.split('|').slice(1, -1).map(c => c.trim().replace(/<[^>]+>/g, ''))
    );
    
    const colCount = Math.max(...data.map(r => r.length));
    const normalized = data.map(row => {
      const r = [...row];
      while (r.length < colCount) r.push('');
      return r.slice(0, colCount);
    });
    
    const colWidths = normalized[0].map((_, i) => 
      Math.min(30, Math.max(...normalized.map(r => (r[i] || '').length), 4))
    );
    
    let out = '```\n';
    normalized.forEach((row, idx) => {
      const line = row.map((c, i) => (c || '').padEnd(colWidths[i])).join(' тФВ ');
      out += line + '\n';
      if (idx === 0 && normalized.length > 1) {
        out += colWidths.map(w => 'тФА'.repeat(w)).join('тФ╝') + '\n';
      }
    });
    out += '```';
    return out;
  });
}

// ==============================
// UI FUNCTIONS
// ==============================
function convert() {
  try {
    const result = convertToWhatsApp(inputEl.value);
    outputEl.value = result;
    showStatus('тЬЕ Konversi berhasil!', 'success');
  } catch (e) {
    showStatus('тЭМ Error: ' + e.message, 'error');
    console.error(e);
  }
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
  showStatus('');
  inputEl.focus();
}

async function copy() {
  if (!outputEl.value.trim()) {
    showStatus('тЪая╕П Tidak ada hasil untuk disalin', 'error');
    return;
  }
  try {
    await navigator.clipboard.writeText(outputEl.value);
    showStatus('ЁЯУЛ Hasil disalin ke clipboard!', 'success');
  } catch {
    // Fallback for older browsers
    outputEl.select();
    document.execCommand('copy');
    showStatus('ЁЯУЛ Hasil disalin!', 'success');
  }
}

function copyInput() {
  if (!inputEl.value.trim()) return;
  inputEl.select();
  document.execCommand('copy');
  showStatus('ЁЯУД Input disalin!', 'success');
}

function showStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
  if (msg) setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ''; }, 3000);
}

// Auto-convert on paste with debounce
let pasteTimeout;
inputEl.addEventListener('paste', () => {
  clearTimeout(pasteTimeout);
  pasteTimeout = setTimeout(() => {
    convert();
  }, 100);
});

// Keyboard shortcut: Ctrl+Enter to convert
inputEl.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    convert();
  }
});

// Initialize
showStatus('Siap! Paste Markdown Anda dan klik Convert ЁЯЪА');
</script>
</body>
</html>
