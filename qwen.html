<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown тЖТ WhatsApp Formatter</title>
<style>
:root {
  --bg: #f0f2f5; --card: #ffffff; --primary: #25d366;
  --primary-hover: #128c7e; --text: #111b21; --subtext: #54656f;
  --border: #d1d7db; --output-bg: #e7efe7;
}
body { font-family: sans-serif; background: var(--bg); padding: 20px; margin: 0; }
.container { max-width: 800px; margin: auto; background: var(--card); 
             padding: 20px; border-radius: 10px; }
textarea { width: 100%; min-height: 120px; margin: 10px 0; padding: 10px; 
           border: 1px solid var(--border); border-radius: 6px; font-family: monospace; }
textarea:focus { outline: none; border-color: var(--primary); }
#output { background: var(--output-bg); min-height: 200px; white-space: pre-wrap; }
button { padding: 10px 16px; margin-right: 5px; cursor: pointer; 
         background: var(--primary); color: white; border: none; 
         border-radius: 6px; font-weight: 500; }
button:hover { background: var(--primary-hover); }
button.secondary { background: #6c757d; }
button.secondary:hover { background: #5a6268; }
.hint { font-size: 12px; color: var(--subtext); margin: 8px 0; }
</style>
</head>
<body>
<div class="container">
  <h2>ЁЯУ▒ Markdown тЖТ WhatsApp Formatter</h2>
  <div class="hint">ЁЯТб Tabel otomatis jadi bullet list vertikal тАв Kolom 1 = judul, Kolom 2+ = sub-list</div>
  
  <textarea id="input" placeholder="Paste Markdown di sini..."></textarea>
  
  <button onclick="convert()">ЁЯФД Convert</button>
  <button class="secondary" onclick="clearAll()">ЁЯЧСя╕П Clear</button>
  <button class="secondary" onclick="copy()">ЁЯУЛ Copy</button>
  
  <textarea id="output" readonly placeholder="Hasil konversi..."></textarea>
</div>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');

// ==============================
// TABLE PARSER - LOGIKA ANDA (ROW-BASED BULLET)
// ==============================
function convertTable(md) {
  const tableRegex = /(\|.*\|\n)+/g;

  return md.replace(tableRegex, (table) => {
    let rows = table.trim().split('\n');
    
    // Hapus separator row: |---|---|
    rows = rows.filter(r => !r.match(/^\|\s*[:\- ]+\|/));
    
    // Parse cells, handle <br> тЖТ newline
    let data = rows.map(r =>
      r.split('|').slice(1, -1).map(c =>
        c.replace(/<br\s*\/?>/gi, '\n').trim()
      )
    );
    
    if (data.length < 2) return table;
    
    const headers = data[0];
    const body = data.slice(1);
    
    let out = '';
    
    body.forEach(row => {
      // Kolom 1 = judul utama
      const title = row[0]?.trim();
      if (!title) return;
      out += `\nтАв ${title}\n`;
      
      // Kolom 2..n = sub-bullet dengan header
      for (let i = 1; i < headers.length; i++) {
        const colTitle = headers[i]?.trim();
        const cell = row[i]?.trim();
        
        if (!colTitle || !cell) continue;
        
        out += `  - ${colTitle}:\n`;
        
        // Split multi-line content, re-number each item
        const lines = cell.split('\n').filter(l => l.trim());
        lines.forEach((line, idx) => {
          // Hapus prefix numbering lama (1. 2. dll), biar tidak dobel
          const clean = line.replace(/^\s*\d+[\.\)]\s*/, '').trim();
          out += `    ${idx + 1}. ${clean}\n`;
        });
      }
    });
    
    return out.trim();
  });
}

// ==============================
// PSEUDO-TABLE HANDLER (тАв X тЖТ Y тЖТ Z format)
// ==============================
function convertPseudoTable(md) {
  // Match: тАв Header тЖТ Col1 тЖТ Col2 тЖТ ... (minimal 3 kolom)
  const pseudoRegex = /^тАв\s*([^тЖТ\n]+?)\s*тЖТ\s*([^тЖТ\n]+?)\s*тЖТ\s*(.+?)(?=\nтАв|\n\n|\n$|$)/gms;
  
  return md.replace(pseudoRegex, (match, titleRaw, col1Raw, restRaw) => {
    const clean = (str) => str.trim()
      .replace(/<[^>]+>/g, '')
      .replace(/^_+|_+$/g, '')
      .trim();
    
    const title = clean(titleRaw);
    const col1Header = clean(col1Raw);
    
    // Parse remaining columns: "Col2 тЖТ Col3 тЖТ ..."
    const remaining = restRaw.split('тЖТ').map(s => clean(s));
    
    let out = `\nтАв ${title}\n`;
    
    // Helper: parse cell content (handle numbered items or comma-separated)
    const parseCell = (str) => {
      str = str.replace(/<[^>]+>/g, '').trim();
      // Jika ada pattern "1. xxx 2. yyy", split by number
      if (/\d+[\.\)]\s/.test(str)) {
        return str.split(/\s*(?=\d+[\.\)]\s*)/).filter(s => s.trim());
      }
      // Else split by comma or newline
      return str.split(/[\n,]/).filter(s => s.trim());
    };
    
    // Column 1
    const items1 = parseCell(remaining[0] || '');
    if (items1.length) {
      out += `  - ${col1Header}:\n`;
      items1.forEach((item, idx) => {
        const cleanItem = item.replace(/^\s*\d+[\.\)]\s*/, '').trim();
        out += `    ${idx + 1}. ${cleanItem}\n`;
      });
    }
    
    // Column 2+ (jika ada)
    for (let i = 1; i < remaining.length; i++) {
      const header = headers?.[i + 1] || `Kolom ${i + 2}`;
      const items = parseCell(remaining[i] || '');
      if (items.length) {
        out += `  - ${header}:\n`;
        items.forEach((item, idx) => {
          const cleanItem = item.replace(/^\s*\d+[\.\)]\s*/, '').trim();
          out += `    ${idx + 1}. ${cleanItem}\n`;
        });
      }
    }
    
    return out.trim();
  });
}

// ==============================
// PROTECT CODE BLOCKS
// ==============================
function protectCodeBlocks(text) {
  const blocks = [];
  text = text.replace(/```[\s\S]*?```/g, match => {
    const id = blocks.length;
    blocks.push(match);
    return `@@CODEBLOCK_${id}@@`;
  });
  return { text, blocks };
}

function restoreCodeBlocks(text, blocks) {
  return text.replace(/@@CODEBLOCK_(\d+)@@/g, (_, i) => blocks[i]);
}

// ==============================
// INLINE FORMAT (FOLLOW YOUR LOGIC)
// ==============================
function formatInline(text) {
  const { text: safeText, blocks } = protectCodeBlocks(text);
  let result = safeText;
  
  // BOLD: **text** or __text__ тЖТ *text*
  result = result.replace(/\*\*(.+?)\*\*/g, '*$1*');
  result = result.replace(/__(.+?)__/g, '*$1*');
  
  // STRIKE: ~~text~~ тЖТ ~text~
  result = result.replace(/~~(.+?)~~/g, '~$1~');
  
  // LINK: [text](url) тЖТ text (url)
  result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)');
  
  // Italic: ONLY convert *text* тЖТ _text_ if standalone (not inside word)
  // Tapi sesuai kode Anda: italic markdown dihapus saja, biar plain
  result = result.replace(/(^|[^*])\*(?!\*)([^*\n]+?)\*(?!\*)/g, '$1_$2_');
  
  // Cleanup stray underscores that aren't meant for italic
  result = result.replace(/(^|[\s])_([^_\n]+?)_(?=[\s.,]|$)/g, '$1$2');
  
  // Fix bullet/heading glitch
  result = result.replace(/^_?([тАвтЦ╢ЁЯУМ])/gm, '$1');
  
  return restoreCodeBlocks(result, blocks);
}

// ==============================
// MAIN CONVERTER
// ==============================
function convertToWhatsApp(md) {
  if (!md?.trim()) return '';
  
  let text = md.replace(/\r\n/g, '\n');
  
  // 1. Clean stray formatting artifacts: "_тАв _" тЖТ "тАв "
  text = text.replace(/_\s*тАв\s*_/g, 'тАв ')
             .replace(/^тАв\s*_+\s*/gm, 'тАв ')
             .replace(/\s*_+\s*(?=\n|$)/gm, '');
  
  // 2. Handle pseudo-table FIRST (тАв X тЖТ Y тЖТ Z)
  text = convertPseudoTable(text);
  
  // 3. Handle standard markdown table | X | Y |
  text = convertTable(text);
  
  // 4. Line-by-line processing: headings, lists, quotes
  const lines = text.split('\n');
  const processed = lines.map(line => {
    let l = line;
    // Headings: # тЖТ ЁЯУМ, ## тЖТ тЦ╢, ### тЖТ тАв
    l = l.replace(/^#\s+(.*)/, 'ЁЯУМ $1');
    l = l.replace(/^##\s+(.*)/, 'тЦ╢ $1');
    l = l.replace(/^###\s+(.*)/, 'тАв $1');
    // Lists: - or * тЖТ тАв
    if (!l.trim().startsWith('```')) {
      l = l.replace(/^(\*|-)\s+/, 'тАв ');
    }
    // Numbered lists: keep as-is but ensure spacing
    l = l.replace(/^(\d+)\.\s+(.*)/, '$1. $2');
    // Blockquotes
    l = l.replace(/^>\s*/, '> ');
    return l;
  }).join('\n');
  
  // 5. Inline formatting
  let result = formatInline(processed);
  
  // 6. Cleanup extra newlines
  result = result.replace(/\n{3,}/g, '\n\n');

  // ==============================
// FIX: _text* тЖТ *_text_* (Bold+Italic WhatsApp)
// ==============================
// Pattern: underscore di awal, asterisk di akhir тЖТ swap jadi *_ ... _*
result = result.replace(/(^|[\s>])_(.+?)\*(?=[\s<.,!?;:]|$)/g, '$1*$2*_');
  
  return result.trim();
}

// ==============================
// UI FUNCTIONS
// ==============================
function convert() {
  outputEl.value = convertToWhatsApp(inputEl.value);
}

function clearAll() {
  inputEl.value = '';
  outputEl.value = '';
  inputEl.focus();
}

async function copy() {
  if (!outputEl.value.trim()) return;
  try {
    await navigator.clipboard.writeText(outputEl.value);
    alert('тЬЕ Copied!');
  } catch {
    outputEl.select();
    document.execCommand('copy');
    alert('тЬЕ Copied!');
  }
}

// Auto-convert on paste
inputEl.addEventListener('paste', () => {
  setTimeout(convert, 50);
});
</script>
  <h3><a href="/converter/">ChatGPT version</a></h3>
</body>
</html>
